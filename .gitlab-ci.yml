# .gitlab-ci.yml
# Equivalent of the "Build Modules" GitHub Actions workflow.
# Trigger via:
#   - Pipeline API / UI  (equivalent of workflow_dispatch)
#   - Downstream pipeline trigger (equivalent of workflow_call with from_ci input)
#
# Set these CI/CD variables in GitLab project settings:
#   TG_TOKEN  — Telegram bot token (masked)
#   FROM_CI   — "true" or "false" (set at trigger time; defaults to "true")

stages:
  - build
  - release

# ─── Reusable defaults ────────────────────────────────────────────────────────
default:
  image: ubuntu:latest   # GitLab SaaS: use "ubuntu-latest" tag on shared runners
                         # Self-managed: map to a runner with the correct tag

# ─── Build job ────────────────────────────────────────────────────────────────
build-modules:
  stage: build

  # Equivalent of "runs-on: ubuntu-latest"
  # On GitLab SaaS the shared runner already provides Ubuntu.
  # Add `tags: [your-runner-tag]` if you use self-managed runners.

  # Equivalent of workflow_dispatch + workflow_call triggers:
  #   $CI_PIPELINE_SOURCE == "web"       → manual UI run (workflow_dispatch)
  #   $CI_PIPELINE_SOURCE == "pipeline"  → triggered by upstream pipeline (workflow_call)
  #   $CI_PIPELINE_SOURCE == "push"      → normal push (optional, remove if unwanted)
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "push"'

  before_script:
    # Install Java 17 (Zulu) — replaces actions/setup-java@v4
    - apt-get update -qq && apt-get install -y -qq curl gnupg unzip git jq openssl zip gh
    - curl -sL https://repos.azul.com/azul-repo.key | gpg --dearmor -o /usr/share/keyrings/azul.gpg
    - echo "deb [signed-by=/usr/share/keyrings/azul.gpg] https://repos.azul.com/zulu/deb stable main" \
        > /etc/apt/sources.list.d/zulu.list
    - apt-get update -qq && apt-get install -y -qq zulu17-jdk
    - java -version

    # Full checkout with submodules — replaces actions/checkout@v4
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git fetch --unshallow || true     # equivalent of fetch-depth: 0
    - git submodule update --init --recursive

  script:
    # ── Update config (only when FROM_CI is true, default true) ──────────────
    # Equivalent of the "Update config" step (if: ${{ inputs.from_ci }})
    - |
      FROM_CI="${FROM_CI:-true}"
      if [ "$FROM_CI" = "true" ]; then
        if git checkout origin/update build.md 2>/dev/null; then
          UPDATE_CFG=$(./build.sh config.toml --config-update)
          if [ "$UPDATE_CFG" ]; then
            echo "$UPDATE_CFG" > config.json
          fi
        fi
      fi


    # ── Get next version code ─────────────────────────────────────────────────
    # Equivalent of "Get next version code" step.
    # Uses GitLab Releases API instead of `gh release list`.
    - |
      LATEST_TAG=$(curl -s --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
        | jq -r '.[0].tag_name // "0"')
      if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then LATEST_TAG=0; fi
      NEXT_VER_CODE=$((LATEST_TAG + 1))
      echo "NEXT_VER_CODE=$NEXT_VER_CODE"
      echo "NEXT_VER_CODE=$NEXT_VER_CODE" >> build.env
      # Export for use in later script steps and artifacts
      echo "NEXT_VER_CODE=$NEXT_VER_CODE" >> build.env

    # ── Build modules/APKs ────────────────────────────────────────────────────
    - |
      export NEXT_VER_CODE=$(grep NEXT_VER_CODE build.env | cut -d= -f2)
      export GITHUB_TOKEN="$GITHUB_TOKEN"
      export GITHUB_REPOSITORY="$CI_PROJECT_PATH"
      if [ -z "$NEXT_VER_CODE" ]; then
        echo "ERROR: NEXT_VER_CODE is empty before build"
        exit 1
      fi
      if [ -f "config.json" ]; then ./build.sh config.json; else ./build.sh config.toml; fi

    # ── Capture build log ─────────────────────────────────────────────────────
    # Equivalent of the "Get output" step.
    - cp -f build.md build.tmp

    # ── Create / upload GitLab release ───────────────────────────────────────
    # Equivalent of svenstaro/upload-release-action@v2.
    # Step 1: Create the release with the changelog body.
    - |
      NEXT_VER_CODE=$(grep NEXT_VER_CODE build.env | cut -d= -f2)
      echo "Creating release for tag: $NEXT_VER_CODE"

      if [ -z "$NEXT_VER_CODE" ]; then
        echo "ERROR: NEXT_VER_CODE is empty before creating release"
        exit 1
      fi
      
      BUILD_LOG=$(cat build.md)

      CREATE_JSON=$(jq -n \
        --arg tag_name "$NEXT_VER_CODE" \
        --arg ref "$CI_COMMIT_SHA" \
        --arg name "ReVanced" \
        --arg desc "$(cat build.md)" \
        '{
          tag_name: $tag_name,
          ref: $ref,
          name: $name,
          description: $desc
        }'
      )

      echo "Create release payload:"
      echo "$CREATE_JSON"

      CREATE_RESP=$(curl -sS -w "\n%{http_code}" --request POST \
        --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "$CREATE_JSON" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")


      CREATE_BODY=$(echo "$CREATE_RESP" | sed '$d')
      CREATE_CODE=$(echo "$CREATE_RESP" | tail -n1)

      if [ "$CREATE_CODE" != "201" ] && [ "$CREATE_CODE" != "200" ]; then
        echo "ERROR: failed to create release, HTTP $CREATE_CODE"
        echo "$CREATE_BODY"
        exit 1
      fi
      echo "Release created."

    # Step 2: Upload every file in ./build/ as a release asset.
    - |
      NEXT_VER_CODE=$(grep NEXT_VER_CODE build.env | cut -d= -f2)
      echo "Attaching assets to release tag: $NEXT_VER_CODE"
      for OUTPUT in ./build/*; do
        [ -f "$OUTPUT" ] || continue
        FILENAME=$(basename "$OUTPUT")
        echo "Uploading asset: $FILENAME"

        UPLOAD_RESP=$(curl -sS -w "\n%{http_code}" --request POST \
          --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
          --form "file=@${OUTPUT}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/uploads")

        UPLOAD_BODY=$(echo "$UPLOAD_RESP" | sed '$d')
        UPLOAD_CODE=$(echo "$UPLOAD_RESP" | tail -n1)

        if [ "$UPLOAD_CODE" != "201" ] && [ "$UPLOAD_CODE" != "200" ]; then
          echo "ERROR: upload failed for ${FILENAME}, HTTP $UPLOAD_CODE"
          echo "$UPLOAD_BODY"
          exit 1
        fi

        FILE_URL=$(echo "$UPLOAD_BODY" | jq -r '.full_path')
        FULL_URL="${CI_SERVER_URL}${FILE_URL}"

        LINK_RESP=$(curl -sS -w "\n%{http_code}" --request POST \
          --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
          --header "Content-Type: application/json" \
          --data "{
            \"name\": \"${FILENAME}\",
            \"url\": \"${FULL_URL}\",
            \"link_type\": \"package\"
          }" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${NEXT_VER_CODE}/assets/links")

        LINK_BODY=$(echo "$LINK_RESP" | sed '$d')
        LINK_CODE=$(echo "$LINK_RESP" | tail -n1)

        if [ "$LINK_CODE" != "201" ] && [ "$LINK_CODE" != "200" ]; then
          echo "ERROR: asset link failed for ${FILENAME}, HTTP $LINK_CODE"
          echo "$LINK_BODY"
          exit 1
        fi
      done

  # Persist build.env so NEXT_VER_CODE is available to downstream jobs
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - build.tmp
      - build/
    when: always
